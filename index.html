<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>несушествующий парфюм</title>
  <meta name="description" content="товар для несушествующего магазина">
  <style>
    .card {
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 16px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .card img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }

    .card h2 {
      font-size: 1.5em;
      margin: 10px 0;
    }

    .card p {
      color: #555;
    }

    .card .price {
      font-size: 1.2em;
      color: #e91e63;
      margin-top: 10px;
    }

    .card button {
      background-color: #e91e63;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #d81b60;
    }
  </style>

</head>

<body>
  <div class="card">
    <img src="OIP (3).webp" alt="Несушествующий парфюм">
    <h2>Несушествующий парфюм</h2>
    <p>Этот парфюм не существует, но он пахнет как мечта. Идеальный аромат для тех, кто любит фантазировать.</p>
    <div class="price">Цена: 0000 руб.</div>
    <button>Купить</button>
    <favicon href="OIP (3).webp" type="image/webp">
      <ul>
        <li>Аромат: Цветочный, фруктовый, древесный</li>
        <li>Объем: 50 мл</li>
        <li>Страна производства: Несуществующая страна</li>
      </ul>
    </favicon>
  </div>
</body>

</html>
